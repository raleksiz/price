<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RALEKSIZ HOUSE — Генератор персональных предложений</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:#F4F0FA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:16px;padding:36px 40px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(80,40,120,0.12);}
  .logo{font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:18px;color:#2B1A6B;letter-spacing:0.5px;margin-bottom:4px;}
  .subtitle{font-size:12px;color:#888;margin-bottom:28px;}
  h1{font-size:17px;font-weight:700;color:#2B1A6B;margin-bottom:24px;}
  label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;}
  .field{margin-bottom:20px;}
  input[type=number], input[type=date], input[type=text], input[type=password]{
    width:100%;border:1.5px solid #DDD;border-radius:10px;padding:11px 14px;
    font-size:16px;font-family:inherit;color:#2B1A6B;outline:none;
    transition:border-color .15s;
  }
  input:focus{border-color:#7C3AED;}
  .btn{
    width:100%;background:linear-gradient(135deg,#7C3AED,#5B21B6);
    color:#fff;border:none;border-radius:10px;padding:14px;
    font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
    transition:opacity .15s;margin-top:4px;
  }
  .btn:hover{opacity:0.9;}
  .result{margin-top:24px;display:none;}
  .result-label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:8px;}
  .result-url{
    background:#F4F0FA;border:1.5px solid #C4B5FD;border-radius:10px;
    padding:12px 14px;font-size:13px;color:#2B1A6B;word-break:break-all;
    line-height:1.5;
  }
  .copy-btn{
    margin-top:10px;width:100%;background:#2B1A6B;color:#fff;border:none;
    border-radius:10px;padding:11px;font-size:14px;font-weight:700;
    font-family:inherit;cursor:pointer;transition:opacity .15s;
  }
  .copy-btn:hover{opacity:0.85;}
  .copy-btn.copied{background:#16a34a;}
  .hint{font-size:11.5px;color:#999;margin-top:10px;line-height:1.5;}
  .save-btn{
    margin-top:8px;width:100%;background:#F3ECFA;color:#6E3B8C;border:1.5px solid #C4B5FD;
    border-radius:10px;padding:11px;font-size:14px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:opacity .15s;
  }
  .save-btn:hover{opacity:0.85;}
  .saved-msg{font-size:12px;color:#16a34a;margin-top:8px;text-align:center;min-height:16px;}
  .offer-item{
    padding:12px 0;border-bottom:1px solid #F0F0F3;display:flex;
    align-items:flex-start;gap:12px;
  }
  .offer-item:last-child{border-bottom:none;}
  .offer-item-info{flex:1;min-width:0;}
  .offer-item-name{font-weight:700;color:#2B1A6B;font-size:13px;margin-bottom:3px;}
  .offer-item-meta{font-size:11.5px;color:#888;line-height:1.6;}
  .offer-item-link{font-size:11px;color:#7C3AED;word-break:break-all;margin-top:3px;}
  .del-btn{
    background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;
    padding:0 4px;flex-shrink:0;line-height:1;
  }
  .del-btn:hover{color:#dc2626;}
  .cats-label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px;}
  .cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px;}
  .cat-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #DDD;border-radius:8px;cursor:pointer;font-size:13px;color:#2B1A6B;transition:border-color .15s,background .15s;}
  .cat-check:hover{border-color:#7C3AED;background:#F9F6FF;}
  .cat-check input{accent-color:#7C3AED;width:16px;height:16px;cursor:pointer;}
  .cat-check.checked{border-color:#7C3AED;background:#F3ECFA;}
</style>
</head>
<body>
<!-- Password screen -->
<div class="card" id="pwdScreen">
  <div class="logo">RALEKSIZ HOUSE</div>
  <div class="subtitle">Только для внутреннего использования</div>
  <h1>Вход</h1>
  <div class="field">
    <label for="pwdInput">Пароль</label>
    <input type="password" id="pwdInput" placeholder="••••••••••" autocomplete="current-password">
  </div>
  <div style="color:#dc2626;font-size:13px;margin-bottom:12px;min-height:18px" id="pwdError"></div>
  <button class="btn" onclick="unlock()">Войти</button>
</div>

<!-- Main screen -->
<div class="card" id="mainScreen" style="display:none">
  <div class="logo">RALEKSIZ HOUSE</div>
  <div class="subtitle">Только для внутреннего использования</div>
  <h1>Персональное предложение</h1>

  <div class="field">
    <label for="forWhom">Для кого</label>
    <input type="text" id="forWhom" placeholder="например, Сафоновой С.В.">
  </div>

  <div class="field">
    <span class="cats-label">Категории со скидкой</span>
    <div class="cats-grid">
      <label class="cat-check" id="lbl_consult"><input type="checkbox" class="cat-cb" value="consult" onchange="toggleCatStyle(this)"> Консультации</label>
      <label class="cat-check" id="lbl_contracts"><input type="checkbox" class="cat-cb" value="contracts" onchange="toggleCatStyle(this)"> Договоры</label>
      <label class="cat-check" id="lbl_realestate"><input type="checkbox" class="cat-cb" value="realestate" onchange="toggleCatStyle(this)"> Недвижимость</label>
      <label class="cat-check" id="lbl_corporate"><input type="checkbox" class="cat-cb" value="corporate" onchange="toggleCatStyle(this)"> Корпоративные</label>
      <label class="cat-check" id="lbl_pretrial"><input type="checkbox" class="cat-cb" value="pretrial" onchange="toggleCatStyle(this)"> Досудебное</label>
      <label class="cat-check" id="lbl_litigation_single"><input type="checkbox" class="cat-cb" value="litigation_single" onchange="toggleCatStyle(this)"> Суд: разовые</label>
      <label class="cat-check" id="lbl_full_repr"><input type="checkbox" class="cat-cb" value="full_repr" onchange="toggleCatStyle(this)"> Суд: под ключ</label>
    </div>
  </div>

  <div class="field">
    <label for="disc">Скидка, %</label>
    <input type="number" id="disc" min="1" max="50" placeholder="например, 15" value="">
  </div>

  <div class="field">
    <label for="exp">Действует до</label>
    <input type="date" id="exp">
  </div>

  <button class="btn" onclick="generate()">Создать ссылку</button>

  <div class="result" id="result">
    <div class="result-label">Ссылка для клиента</div>
    <div class="result-url" id="resultUrl"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyLink()">Скопировать ссылку</button>
    <button class="save-btn" id="saveBtn" onclick="saveOffer()">Сохранить в список</button>
    <div class="hint" id="hint"></div>
    <div class="saved-msg" id="savedMsg"></div>
  </div>
</div>

<!-- Sent offers list -->
<div class="card" id="sentOffersCard" style="display:none;margin-top:16px;">
  <h2 style="font-size:15px;font-weight:700;color:#2B1A6B;margin-bottom:16px;">Разосланные персональные предложения</h2>

  <!-- Manual add form -->
  <div style="background:#F8F6FF;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:10px;">Добавить вручную</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <input type="text" id="manualName" placeholder="Для кого (дат. падеж)" style="border:1.5px solid #DDD;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#2B1A6B;outline:none;">
      <input type="text" id="manualDisc" placeholder="Скидка, %" style="border:1.5px solid #DDD;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#2B1A6B;outline:none;">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <input type="date" id="manualExp" style="border:1.5px solid #DDD;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#2B1A6B;outline:none;">
      <input type="text" id="manualUrl" placeholder="Ссылка" style="border:1.5px solid #DDD;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#2B1A6B;outline:none;">
    </div>
    <button onclick="addManualOffer()" style="width:100%;background:#2B1A6B;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;">Добавить</button>
  </div>

  <!-- Table -->
  <div style="overflow-x:auto;">
    <table id="sentOffersTable" style="width:100%;border-collapse:collapse;font-size:12.5px;">
      <thead>
        <tr style="border-bottom:2px solid #E4E5EA;text-align:left;">
          <th style="padding:6px 8px;color:#888;font-weight:700;font-size:11px;text-transform:uppercase;">Получатель</th>
          <th style="padding:6px 8px;color:#888;font-weight:700;font-size:11px;text-transform:uppercase;">Скидка</th>
          <th style="padding:6px 8px;color:#888;font-weight:700;font-size:11px;text-transform:uppercase;">Действует до</th>
          <th style="padding:6px 8px;color:#888;font-weight:700;font-size:11px;text-transform:uppercase;">Ссылка</th>
          <th style="padding:6px 8px;"></th>
        </tr>
      </thead>
      <tbody id="sentOffersList"></tbody>
    </table>
  </div>
</div>

<script>
const BASE_URL = 'https://raleksiz.github.io/price/';
const PWD_HASH = '6fefdb650f29dd6d348c2a43f02ec33433d70e84cfac3c8d94c765b674942ada';
const SESSION_KEY = 'raleksiz_offer_session';
const SESSION_TTL = 3 * 24 * 60 * 60 * 1000; // 3 days
const OFFERS_KEY = 'raleksiz_sent_offers';

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function checkSession(){
  try {
    const ts = localStorage.getItem(SESSION_KEY);
    if (ts && (Date.now() - Number(ts)) < SESSION_TTL){
      showMain();
      return true;
    }
  } catch(e){}
  return false;
}

function showMain(){
  document.getElementById('pwdScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  renderSentOffers();
}

async function unlock(){
  const pwd = document.getElementById('pwdInput').value;
  if (!pwd){ document.getElementById('pwdError').textContent = 'Введите пароль'; return; }
  const hash = await sha256(pwd);
  if (hash === PWD_HASH){
    try { localStorage.setItem(SESSION_KEY, Date.now()); } catch(e){}
    showMain();
  } else {
    document.getElementById('pwdError').textContent = 'Неверный пароль';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pwdScreen').style.display !== 'none'){
    unlock();
  }
});

// Check session on load
window.addEventListener('DOMContentLoaded', () => { checkSession(); });

function toggleCatStyle(cb){
  cb.closest('.cat-check').classList.toggle('checked', cb.checked);
}

function generate(){
  const disc = parseInt(document.getElementById('disc').value);
  const exp = document.getElementById('exp').value;
  const forWhom = document.getElementById('forWhom').value.trim();
  const cats = [...document.querySelectorAll('.cat-cb:checked')].map(c => c.value);

  if (!disc || disc < 1 || disc > 50){ alert('Укажите скидку от 1 до 50%'); return; }
  if (!exp){ alert('Укажите дату окончания'); return; }
  if (cats.length === 0){ alert('Выберите хотя бы одну категорию услуг'); return; }

  const payload = JSON.stringify({ disc, exp, for: forWhom, cats });
  const token = btoa(encodeURIComponent(payload));
  const url = BASE_URL + '?offer=' + token;

  document.getElementById('resultUrl').textContent = url;
  document.getElementById('result').style.display = 'block';

  const d = new Date(exp);
  const dateStr = d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'});
  const whoStr = forWhom ? ` · Для: ${forWhom}` : '';
  const catsStr = cats.length + ' кат.';
  document.getElementById('hint').textContent =
    `Скидка ${disc}% · ${catsStr}${whoStr} · Действует до ${dateStr}`;

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Скопировать ссылку';
  copyBtn.classList.remove('copied');
}

function copyLink(){
  const url = document.getElementById('resultUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Скопировано ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Скопировать ссылку'; btn.classList.remove('copied'); }, 2000);
  });
}

function saveOffer(){
  const url = document.getElementById('resultUrl').textContent;
  const forWhom = document.getElementById('forWhom').value.trim();
  const disc = document.getElementById('disc').value;
  const exp = document.getElementById('exp').value;
  const cats = [...document.querySelectorAll('.cat-cb:checked')].map(c => c.value);
  if (!url) return;

  try {
    const offers = JSON.parse(localStorage.getItem(OFFERS_KEY) || '[]');
    offers.unshift({ id: Date.now(), forWhom, disc, exp, cats, url, saved: new Date().toLocaleDateString('ru-RU') });
    localStorage.setItem(OFFERS_KEY, JSON.stringify(offers));
    renderSentOffers();
    const msg = document.getElementById('savedMsg');
    msg.textContent = 'Сохранено ✓';
    setTimeout(() => msg.textContent = '', 2000);
  } catch(e) { alert('Не удалось сохранить'); }
}

function deleteOffer(id){
  try {
    const offers = JSON.parse(localStorage.getItem(OFFERS_KEY) || '[]');
    localStorage.setItem(OFFERS_KEY, JSON.stringify(offers.filter(o => o.id !== id)));
    renderSentOffers();
  } catch(e){}
}

function renderSentOffers(){
  try {
    const offers = JSON.parse(localStorage.getItem(OFFERS_KEY) || '[]');
    const card = document.getElementById('sentOffersCard');
    const tbody = document.getElementById('sentOffersList');
    card.style.display = 'block';
    if (!offers.length){
      tbody.innerHTML = '<tr><td colspan="5" style="padding:16px 8px;color:#aaa;text-align:center;font-size:13px;">Список пуст</td></tr>';
      return;
    }
    tbody.innerHTML = offers.map(o => {
      const d = o.exp ? new Date(o.exp).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
      const shortUrl = o.url ? o.url.replace('https://raleksiz.github.io/price/?offer=','…?offer=').slice(0,30)+'…' : '—';
      return `<tr style="border-bottom:1px solid #F0F0F3;">
        <td style="padding:8px 8px;color:#2B1A6B;font-weight:600;">${o.forWhom||'—'}</td>
        <td style="padding:8px 8px;color:#E65100;font-weight:700;">${o.disc ? '-'+o.disc+'%' : '—'}</td>
        <td style="padding:8px 8px;color:#555;">${d}</td>
        <td style="padding:8px 8px;"><a href="${o.url||'#'}" target="_blank" style="color:#7C3AED;font-size:11px;word-break:break-all;">${shortUrl}</a></td>
        <td style="padding:8px 4px;"><button onclick="deleteOffer(${o.id})" style="background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0;" title="Удалить">✕</button></td>
      </tr>`;
    }).join('');
  } catch(e){}
}

function addManualOffer(){
  const forWhom = document.getElementById('manualName').value.trim();
  const disc = document.getElementById('manualDisc').value.trim();
  const exp = document.getElementById('manualExp').value;
  const url = document.getElementById('manualUrl').value.trim();
  if (!forWhom && !url){ alert('Заполните хотя бы получателя или ссылку'); return; }
  try {
    const offers = JSON.parse(localStorage.getItem(OFFERS_KEY) || '[]');
    offers.unshift({ id: Date.now(), forWhom, disc, exp, cats:[], url, saved: new Date().toLocaleDateString('ru-RU') });
    localStorage.setItem(OFFERS_KEY, JSON.stringify(offers));
    document.getElementById('manualName').value = '';
    document.getElementById('manualDisc').value = '';
    document.getElementById('manualExp').value = '';
    document.getElementById('manualUrl').value = '';
    renderSentOffers();
  } catch(e){ alert('Не удалось сохранить'); }
}
</script>
</body>
</html>
